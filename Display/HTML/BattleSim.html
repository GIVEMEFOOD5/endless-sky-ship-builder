<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Simulator — Endless Sky Data Center</title>
    <link rel="stylesheet" href="../CSS/main.css">
</head>
<body>

<div id="navbar-mount" data-src="NavBar.html"></div>
<script src="../JavaScript/navLoader.js"></script>

<div class="container">
    <header class="panel">
        <h1>⚔️ Battle Simulator</h1>
        <p class="subtitle">Multi-team analytical combat — add unlimited teams and ships, then simulate</p>
    </header>

    <!-- Plugin selector -->
    <div class="panel search-section" id="pluginSelectorPanel">
        <h2 class="section-title" style="font-size:1.1rem;margin-bottom:10px;">Active Plugins</h2>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <button class="btn-action" onclick="openPluginPicker()">☰ Select Plugins</button>
            <span style="font-size:0.82rem;color:#64748b;font-style:italic;">First plugin = primary for image/outfit lookup</span>
        </div>
        <div id="activePluginList"><span class="sorter-empty">Loading…</span></div>
        <div id="simStatus" style="margin-top:10px;font-size:0.88rem;display:none;"></div>
    </div>

    <!-- Main sim area -->
    <div class="panel" id="simPanel" style="display:none;">

        <!-- Teams -->
        <div style="margin-bottom:8px;">
            <div class="timeline-label">Teams</div>
            <div id="teamsContainer"></div>
            <button id="addTeamBtn" onclick="addNewTeam()">＋ Add Team</button>
        </div>

        <!-- Fight button -->
        <div class="fight-btn-wrap">
            <button class="fight-btn" id="fightBtn" disabled>⚔ SIMULATE BATTLE</button>
        </div>

        <div class="sim-loading" id="simLoading">Computing battle…</div>

        <!-- Results -->
        <div id="simResults" style="display:none;">

            <div class="result-header">
                <div class="result-winner-label">🏆 Winner</div>
                <div class="result-winner-name" id="resultWinnerName"></div>
                <div class="result-subtitle" id="resultSubtitle"></div>
            </div>

            <!-- 2-team timeline (hidden for N>2) -->
            <div id="timelineSection">
                <div class="timeline-label">Survival Timeline</div>
                <div class="timeline-track">
                    <div class="timeline-bar-a" id="timelineBarA">
                        <span class="timeline-bar-label" id="timelineLabelA"></span>
                    </div>
                    <div class="timeline-bar-b" id="timelineBarB">
                        <span class="timeline-bar-label" id="timelineLabelB"></span>
                    </div>
                    <div class="timeline-midline"></div>
                </div>
            </div>

            <!-- HP chart (2-team only) -->
            <div id="hpChartContainer"></div>

            <!-- Stats comparison (2-team only) -->
            <div id="compareGrid"></div>

            <!-- N-team matrix (hidden for 2-team) -->
            <div id="matrixSection" style="display:none;"></div>

            <!-- Weapon breakdown (2-team only) -->
            <div style="margin-bottom:8px;" id="weaponsSection">
                <div class="timeline-label">Weapon Analysis</div>
                <div class="weapons-grid" id="weaponsGrid"></div>
            </div>

            <!-- Combat phases -->
            <div>
                <div class="timeline-label">Combat Phases</div>
                <div class="phase-list" id="phaseList"></div>
            </div>

        </div><!-- /#simResults -->

    </div><!-- /#simPanel -->

    <!-- Plugin picker overlay is injected automatically by generalPluginStuff.js -->

</div><!-- /.container -->

<!-- Scripts -->
<script src="../JavaScript/Animator.js"></script>
<script src="../JavaScript/EffectGrabber.js"></script>
<script src="../JavaScript/ImageGrabber.js"></script>
<script src="../JavaScript/generalPluginStuff.js"></script>
<script src="../JavaScript/antiMissileAnalysis.js"></script>
<script src="../JavaScript/munitionTypes.js"></script>
<script src="../JavaScript/movementStats.js"></script>
<script src="../JavaScript/damageTypes.js"></script>
<script src="../JavaScript/computedStats.js"></script>
<script src="../JavaScript/battleSimStatsDisplay.js"></script>
<script src="../JavaScript/battleSim.js"></script>

</body>
</html>
