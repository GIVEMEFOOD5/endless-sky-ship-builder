<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Simulator — Endless Sky Data Center</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <style>
        /* ── Battle Sim specific styles ─────────────────────────── */
        .sim-layout {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: start;
            margin-bottom: 24px;
        }
        @media (max-width: 820px) {
            .sim-layout { grid-template-columns: 1fr; }
            .sim-vs     { text-align: center; font-size: 2rem; padding: 0; }
        }

        .sim-vs {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--c-accent-text);
            padding: 20px 10px;
            text-shadow: 0 0 24px rgba(59,130,246,0.6);
            letter-spacing: 0.05em;
            user-select: none;
        }

        /* ── Ship slot ─────────────────────────────────────────── */
        .ship-slot {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: border-color var(--t-base);
        }
        .ship-slot.slot-a { border-top: 3px solid #3b82f6; }
        .ship-slot.slot-b { border-top: 3px solid #ef4444; }
        .ship-slot.slot-a.has-ship { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.15); }
        .ship-slot.slot-b.has-ship { border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.15); }

        .slot-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .slot-a .slot-title { color: #93c5fd; }
        .slot-b .slot-title { color: #fca5a5; }

        .ship-search-wrap { position: relative; }
        .ship-search-wrap input {
            width: 100%;
            padding: 10px 14px;
            background: var(--c-surface-2);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            color: var(--c-text);
            font-size: 0.9rem;
        }
        .ship-search-wrap input:focus {
            outline: none;
            border-color: var(--c-accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .ship-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: rgba(10,18,38,0.98);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            max-height: 260px;
            overflow-y: auto;
            z-index: 200;
            display: none;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        .ship-dropdown.open { display: block; }
        .ship-dropdown-item {
            padding: 9px 14px;
            cursor: pointer;
            font-size: 0.88rem;
            color: var(--c-text-mid);
            border-bottom: 1px solid rgba(59,130,246,0.07);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            transition: background var(--t-fast);
        }
        .ship-dropdown-item:hover { background: rgba(59,130,246,0.15); color: var(--c-text); }
        .ship-dropdown-item .sdi-plugin {
            font-size: 0.75rem;
            color: var(--c-text-dim);
            white-space: nowrap;
        }
        .ship-dropdown-empty {
            padding: 12px 14px;
            color: var(--c-text-muted);
            font-style: italic;
            font-size: 0.88rem;
        }

        /* ── Selected ship card ─────────────────────────────────── */
        .selected-ship {
            display: none;
            background: rgba(15,23,42,0.5);
            border: 1px solid var(--c-border);
            border-radius: var(--r-md);
            padding: 14px;
            gap: 12px;
        }
        .selected-ship.visible { display: flex; }
        .selected-ship-img {
            width: 64px; height: 64px;
            border-radius: var(--r-sm);
            object-fit: contain;
            background: rgba(30,41,59,0.5);
            flex-shrink: 0;
        }
        .selected-ship-info { flex: 1; min-width: 0; }
        .selected-ship-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--c-accent-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .selected-ship-meta {
            font-size: 0.8rem;
            color: var(--c-text-muted);
            margin-top: 3px;
        }
        .selected-ship-clear {
            background: none;
            border: none;
            color: var(--c-text-dim);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 2px 6px;
            border-radius: var(--r-sm);
            flex-shrink: 0;
            transition: color var(--t-fast), background var(--t-fast);
        }
        .selected-ship-clear:hover { color: var(--c-danger-hi); background: var(--c-danger); }

        /* ── Mini stat strip on the slot ──────────────────────────*/
        .slot-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 4px;
        }
        .slot-stat {
            background: rgba(15,23,42,0.4);
            border: 1px solid var(--c-border);
            border-radius: var(--r-sm);
            padding: 5px 8px;
            font-size: 0.78rem;
        }
        .slot-stat-label { color: var(--c-text-muted); }
        .slot-stat-value { color: var(--c-text); font-weight: 600; font-variant-numeric: tabular-nums; }

        /* ── Fight button ────────────────────────────────────────── */
        .fight-btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .fight-btn {
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: none;
            border-radius: var(--r-lg);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform var(--t-base), box-shadow var(--t-base), opacity var(--t-fast);
            box-shadow: 0 4px 20px rgba(59,130,246,0.35);
        }
        .fight-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(59,130,246,0.5);
        }
        .fight-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ── Results panel ───────────────────────────────────────── */
        #resultsPanel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        #resultsPanel.visible { display: block; }

        .result-header {
            text-align: center;
            padding: 28px 20px 20px;
            border-bottom: 1px solid var(--c-border);
            margin-bottom: 24px;
        }
        .result-winner-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--c-text-muted);
            margin-bottom: 8px;
        }
        .result-winner-name {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .result-winner-a { color: #60a5fa; text-shadow: 0 0 30px rgba(59,130,246,0.5); }
        .result-winner-b { color: #f87171; text-shadow: 0 0 30px rgba(239,68,68,0.5); }
        .result-winner-draw { color: var(--c-warn-text); }
        .result-subtitle { font-size: 0.9rem; color: var(--c-text-muted); }

        /* ── Timeline bar ────────────────────────────────────────── */
        .timeline-section { margin-bottom: 24px; }
        .timeline-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--c-text-dim);
            margin-bottom: 10px;
        }
        .timeline-track {
            position: relative;
            height: 48px;
            background: rgba(15,23,42,0.6);
            border: 1px solid var(--c-border);
            border-radius: 24px;
            overflow: hidden;
        }
        .timeline-bar-a {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(59,130,246,0.7), rgba(59,130,246,0.3));
            border-radius: 24px 0 0 24px;
            transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
            display: flex;
            align-items: center;
            padding-left: 12px;
        }
        .timeline-bar-b {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            background: linear-gradient(270deg, rgba(239,68,68,0.7), rgba(239,68,68,0.3));
            border-radius: 0 24px 24px 0;
            transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
        }
        .timeline-bar-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            white-space: nowrap;
        }
        .timeline-midline {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 1px;
            background: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        /* ── Results grid ────────────────────────────────────────── */
        .results-compare {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 2px 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 600px) {
            .results-compare { grid-template-columns: 1fr; }
            .res-divider { display: none; }
        }

        .res-col { display: flex; flex-direction: column; gap: 4px; }
        .res-col-a .res-row { border-left: 2px solid rgba(59,130,246,0.4); }
        .res-col-b .res-row { border-right: 2px solid rgba(239,68,68,0.4); text-align: right; }
        .res-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding-top: 2px;
        }
        .res-divider-item {
            font-size: 0.7rem;
            color: var(--c-text-dim);
            height: 28px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .res-section-title {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--c-text-dim);
            padding: 8px 8px 2px;
            grid-column: 1 / -1;
        }

        .res-row {
            display: flex;
            flex-direction: column;
            padding: 5px 8px;
            background: rgba(15,23,42,0.35);
            border-radius: 5px;
            border: 1px solid rgba(59,130,246,0.08);
        }
        .res-row-label { font-size: 0.7rem; color: var(--c-text-muted); }
        .res-row-value { font-size: 0.92rem; font-weight: 600; color: var(--c-text); font-variant-numeric: tabular-nums; }
        .res-row-value.better { color: #86efac; }
        .res-row-value.worse  { color: #fca5a5; }
        .res-row-value.warn   { color: var(--c-warn-text); }

        /* ── Weapon breakdown ────────────────────────────────────── */
        .weapons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) { .weapons-grid { grid-template-columns: 1fr; } }

        .weapons-col-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .weapons-col-title-a { color: #93c5fd; }
        .weapons-col-title-b { color: #fca5a5; }

        .weapon-item {
            background: rgba(15,23,42,0.45);
            border: 1px solid var(--c-border);
            border-radius: var(--r-sm);
            padding: 8px 10px;
            margin-bottom: 5px;
            font-size: 0.8rem;
        }
        .weapon-item-name {
            font-weight: 600;
            color: var(--c-accent-text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .weapon-item-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 10px;
        }
        .weapon-stat { color: var(--c-text-muted); }
        .weapon-stat span { color: var(--c-text); font-weight: 500; }

        /* ── Phase timeline events ─────────────────────────────────*/
        .phase-list { display: flex; flex-direction: column; gap: 6px; }
        .phase-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 7px 10px;
            background: rgba(15,23,42,0.35);
            border-radius: var(--r-sm);
            border-left: 2px solid var(--c-border);
            font-size: 0.82rem;
        }
        .phase-item.phase-a { border-left-color: rgba(59,130,246,0.6); }
        .phase-item.phase-b { border-left-color: rgba(239,68,68,0.6); }
        .phase-item.phase-neutral { border-left-color: rgba(250,200,50,0.5); }
        .phase-time {
            font-size: 0.72rem;
            color: var(--c-text-dim);
            white-space: nowrap;
            margin-top: 1px;
            min-width: 52px;
        }
        .phase-text { color: var(--c-text-mid); line-height: 1.4; }
        .phase-text strong { color: var(--c-text); }

        /* ── Warning badges ──────────────────────────────────────── */
        .warn-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 9px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--c-warn);
            color: var(--c-warn-text);
            border: 1px solid rgba(250,200,50,0.25);
        }
        .danger-badge {
            background: var(--c-danger);
            color: var(--c-danger-text);
            border-color: rgba(239,68,68,0.25);
        }

        /* ── Loading sim ─────────────────────────────────────────── */
        .sim-loading {
            text-align: center;
            padding: 24px;
            color: var(--c-text-muted);
            font-style: italic;
            display: none;
        }
        .sim-loading.visible { display: block; }
    </style>
</head>
<body>

<div id="navbar-mount" data-src="NavBar.html"></div>
<script src="../JavaScript/navLoader.js"></script>

<div class="container">
    <header class="panel">
        <h1>⚔️ Battle Simulator</h1>
        <p class="subtitle">Analytical combat prediction — select two ships and see who wins</p>
    </header>

    <!-- Plugin selector (mirrors DataViewer) -->
    <div class="panel search-section" id="pluginSelectorPanel">
        <h2 class="section-title" style="font-size:1.1rem;margin-bottom:10px;">
            Active Plugins
        </h2>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <button class="btn-action" onclick="openPluginPicker()">☰ Select Plugins</button>
            <span style="font-size:0.82rem;color:#64748b;font-style:italic;">
                First plugin = primary for image/outfit lookup
            </span>
        </div>
        <div id="activePluginList">
            <span class="sorter-empty">Loading…</span>
        </div>
        <div id="simStatus" style="margin-top:10px;font-size:0.88rem;display:none;"></div>
    </div>

    <!-- Main sim area -->
    <div class="panel" id="simPanel" style="display:none;">

        <!-- Ship selectors -->
        <div class="sim-layout">

            <!-- Slot A -->
            <div class="ship-slot slot-a" id="slotA">
                <div class="slot-title">⚔ Attacker A</div>

                <div class="ship-search-wrap">
                    <input type="text" id="searchA" placeholder="🔍 Search ships…"
                           autocomplete="off" oninput="searchShips('A', this.value)"
                           onfocus="openDropdown('A')" onblur="blurDropdown('A')">
                    <div class="ship-dropdown" id="dropdownA"></div>
                </div>

                <div class="selected-ship" id="selectedA">
                    <img class="selected-ship-img" id="imgA" src="" alt="">
                    <div class="selected-ship-info">
                        <div class="selected-ship-name" id="nameA"></div>
                        <div class="selected-ship-meta" id="metaA"></div>
                    </div>
                    <button class="selected-ship-clear" onclick="clearSlot('A')" title="Clear">✕</button>
                </div>

                <div class="slot-stats" id="statsA" style="display:none;"></div>
            </div>

            <div class="sim-vs">VS</div>

            <!-- Slot B -->
            <div class="ship-slot slot-b" id="slotB">
                <div class="slot-title">⚔ Attacker B</div>

                <div class="ship-search-wrap">
                    <input type="text" id="searchB" placeholder="🔍 Search ships…"
                           autocomplete="off" oninput="searchShips('B', this.value)"
                           onfocus="openDropdown('B')" onblur="blurDropdown('B')">
                    <div class="ship-dropdown" id="dropdownB"></div>
                </div>

                <div class="selected-ship" id="selectedB">
                    <img class="selected-ship-img" id="imgB" src="" alt="">
                    <div class="selected-ship-info">
                        <div class="selected-ship-name" id="nameB"></div>
                        <div class="selected-ship-meta" id="metaB"></div>
                    </div>
                    <button class="selected-ship-clear" onclick="clearSlot('B')" title="Clear">✕</button>
                </div>

                <div class="slot-stats" id="statsB" style="display:none;"></div>
            </div>
        </div>

        <!-- Fight button -->
        <div class="fight-btn-wrap">
            <button class="fight-btn" id="fightBtn" onclick="runSimulation()" disabled>
                ⚔ SIMULATE BATTLE
            </button>
        </div>

        <div class="sim-loading" id="simLoading">Computing battle…</div>

        <!-- Results -->
        <div id="resultsPanel">

            <div class="result-header">
                <div class="result-winner-label">🏆 Winner</div>
                <div class="result-winner-name" id="resultWinnerName"></div>
                <div class="result-subtitle" id="resultSubtitle"></div>
            </div>

            <!-- Timeline bar -->
            <div class="timeline-section">
                <div class="timeline-label">Survival Timeline</div>
                <div class="timeline-track">
                    <div class="timeline-bar-a" id="timelineBarA">
                        <span class="timeline-bar-label" id="timelineLabelA"></span>
                    </div>
                    <div class="timeline-bar-b" id="timelineBarB">
                        <span class="timeline-bar-label" id="timelineLabelB"></span>
                    </div>
                    <div class="timeline-midline"></div>
                </div>
            </div>

            <!-- Stats comparison -->
            <div id="compareGrid"></div>

            <!-- Weapon breakdown -->
            <div style="margin-bottom:8px;">
                <div class="timeline-label">Weapon Analysis</div>
                <div class="weapons-grid" id="weaponsGrid"></div>
            </div>

            <!-- Combat phases -->
            <div>
                <div class="timeline-label">Combat Phases</div>
                <div class="phase-list" id="phaseList"></div>
            </div>

        </div><!-- /#resultsPanel -->

    </div><!-- /#simPanel -->

    <!-- Plugin picker (shared with DataViewer) -->
    <div id="pluginPickerOverlay">
        <div class="modal-box modal-box--picker">
            <div class="picker-header">
                <span class="picker-header__title">Select Plugins</span>
                <button class="btn-close btn-close--sm" onclick="closePluginPicker()">✕</button>
            </div>
            <input class="text-input picker-search" type="text"
                   id="pluginPickerSearch"
                   placeholder="🔍 Search plugins…"
                   oninput="renderPluginPickerList(this.value)">
            <div class="picker-list" id="pluginPickerList"></div>
            <div class="picker-footer">
                <button class="btn btn-secondary" onclick="closePluginPicker()">Cancel</button>
                <button class="btn btn-primary"   onclick="confirmPluginPicker()">Done</button>
            </div>
        </div>
    </div>

</div><!-- /.container -->

<!-- Scripts -->
<script src="../JavaScript/generalPluginStuff.js"></script>
<script src="../JavaScript/computedStats.js"></script>
<script src="../JavaScript/BattleSim.js"></script>

</body>
</html>
