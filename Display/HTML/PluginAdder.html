<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Sky Data Viewer</title>
    <link rel="stylesheet" href="../CSS/main.css">
</head>
<body>
    <div class="container">

        <header class="panel">
            <h1>🚀 Endless Sky Plugin Adder</h1>
            <p class="subtitle">Add your favourit plugin repositorys</p>
            <p class="subtitle">THESE ARE GLOBAL ANDS CURRENTLY AN WIP!!</p>
            <p class="subtitle">THERE IS MULTI PLUGIN REPOSITORY SUPPORT!! (tested with Zuckungs <3)</p>
        </header>
      
        <!-- ── Configuration ───────────────────────────────────────────────── -->
        <div class="panel config-section">
            <h2 class="section-title">⚙️ Configuration</h2>
            <div class="input-group">
                <label for="repoUrl">GitHub Repository URL (username/repository)</label>
                <input class="text-input" type="text" id="repoUrl"
                       placeholder="e.g., username/endless-sky-data" value="">
            </div>
            <div class="button-group">
                <button class="btn btn-primary">
                    <span>📥</span> Add Plugin
                </button>
                <button class="btn btn-secondary">
                    <span>🗑️</span> Clear
                </button>
            </div>
        </div>
    </div>
</body>
</html>
