<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Endless Sky Data Center</title>
    <link rel="stylesheet" href="Display/CSS/main.css">
</head>
<body>

<div id="navbar-mount"></div>
    <script>
        fetch('../HTML/NavBar.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('navbar-mount').innerHTML = html;
                // Load the navbar script only after the markup exists
                const s = document.createElement('script');
                s.src = '../JavaScript/navBar.js';
                document.body.appendChild(s);
            })
            .catch(() => console.warn('Navbar failed to load.'));
    </script>
    <div class="container">
        <header>
            <h1>🚀 An Endless Sky Data Center</h1>
            <p class="subtitle">Browse and manage ships and outfits from the amazing game Endless Sky!</p>
        </header>
