name: Parse Endless Sky Data
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
  push:
    paths:
      - 'plugins.json'
permissions:
  contents: write
jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            plugins.json
            parser.js
            speciesResolver.js
            locationResolver.js
            attributeParser.js
            data/

      - name: Mark parse as running
        run: |
          echo '{"status":"running","startedAt":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > parse-status.json
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add parse-status.json
          git commit -m "chore: mark parse as running"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clear existing data folder
        run: |
          git rm -r --cached data/ --quiet || true
          rm -rf data/

      - name: Run parser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node parser.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || (
            git commit -m "Update Endless Sky data - $(date +'%Y-%m-%d')" &&
            git pull --rebase &&
            git push
          )

      - name: Mark parse as complete
        if: always()
        run: |
          echo '{"status":"idle","completedAt":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > parse-status.json
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add parse-status.json
          git diff --staged --quiet || (
            git commit -m "chore: mark parse as complete" &&
            git pull --rebase &&
            git push
          )
