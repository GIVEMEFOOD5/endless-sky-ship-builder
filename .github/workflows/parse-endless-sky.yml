name: Parse Endless Sky Data

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
  push:
    paths:
      - 'plugins.json'

concurrency:
  group: parse-job
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            plugins.json
            parser.js
            speciesResolver.js
            locationResolver.js
            attributeParser.js
            data/
            parse-status.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install parser dependencies
        run: npm install adm-zip tar --no-save

      - name: Clear existing data folder
        run: |
          git rm -r --cached data/ --quiet || true
          rm -rf data/

      - name: Run parser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node parser.js

      - name: Commit parsed data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "Update Endless Sky data - $(date +'%Y-%m-%d')"
            git fetch origin main
            git rebase -X theirs origin/main
            git push
          else
            echo "No changes to commit"
          fi

      - name: Mark parse as complete
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git rebase -X theirs origin/main
          echo '{"status":"idle","completedAt":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > parse-status.json
          git add parse-status.json
          git diff --staged --quiet || (
            git commit -m "chore: mark parse as complete" &&
            git push
          )
